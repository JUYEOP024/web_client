<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Grid</title>
	<link rel="stylesheet" href="css/12_layout_grid.css">
</head>

<body>
	<h1>Grid</h1>
	<!-- @실습문제: https://cssgridgarden.com/ -->

	<!--
		display: grid -> 요소를 Grid(행, 열 기반) 컨테이너로 설정
	-->

	<h2>grid-template-columns</h2>
	<div class="container container1">
		<div class="item item1">1</div>
		<div class="item item1">2</div>
		<div class="item item1">3</div>
		<div class="item item1">4</div>
		<div class="item item1">5</div>
		<div class="item item1">6</div>
		<div class="item item1">7</div>
		<div class="item item1">8</div>
		<div class="item item1">9</div>
		<div class="item item1">10</div>
	</div>


	<h2>grid-template-rows</h2>
	<div class="container container2">
		<div class="item item2">1</div>
		<div class="item item2">2</div>
		<div class="item item2">3</div>
		<div class="item item2">4</div>
		<div class="item item2">5</div>
		<div class="item item2">6</div>
		<div class="item item2">7</div>
		<div class="item item2">8</div>
		<div class="item item2">9</div>
		<div class="item item2">10</div>
	</div>

	<!--
		grid-column : 요소가 차지할 열 범위 지정
		grid-row : 요소가 차지할 행 범위 지정
	-->

	<h2>grid-column-start/end | grid-row-start/end</h2>
	<div class="container container3">
		<div class="item item01">01</div>
		<div class="item item02">02</div>
		<div class="item item03">03</div>
	</div>

	<!-- 
		fr단위 -> Grid 에서 사용하는 비율 기반 단위
		repeat() : 동일한 행/열 구조 반복 생성
		minmax() : Grid 크기의 최소 / 최대 범위 설정
	-->
	<h2>fr | repeat | minmax</h2>
	<div class="container container4">
		<div class="item">1</div>
		<div class="item">2</div>
		<div class="item">3</div>
		<div class="item">4</div>
		<div class="item">5</div>
		<div class="item">6</div>
		<div class="item">7</div>
		<div class="item">8</div>
		<div class="item item-height-200"></div>
	</div>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>

</html>
