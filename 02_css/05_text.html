<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS | Text</title>
  <link rel="stylesheet" href="css/05_text.css">
</head>
<body>
  <h1>Text</h1>

  <!-- 글자 스타일 적용
    text-align : 텍스트 정렬 방식 (left, center, right)
    text-decoration : 텍스트 밑줄, 취소선 등 스타일 (underline, line-through, overline 등)
    text-shadow : 텍스트에 그림자 효과 적용
    -->
  
  <h2 id="sample">봄여름가을겨울</h2>
  <a href="./">인덱스로 이동</a>

  <div class="bg">
    <!-- p#shadow$.shadow{HTML5}*4 -->
    <p id="shadow1" class="shadow">HTML5</p>
    <p id="shadow2" class="shadow">HTML5</p>
    <p id="shadow3" class="shadow">HTML5</p>
    <p id="shadow4" class="shadow">HTML5</p>
  </div>

</body>
</html>
