<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS | Font</title>
  <link rel="stylesheet" href="css/04_font.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Font</h1>
  <!-- div>p#font1
    font-family : 사용할 글꼴 (왼쪽부터 사용가능 폰트 검색)
    font-size : 글자 크기
    font-weight : 글자 두께 (normal, bold 등)
    font-style : 글자 스타일 (italic 등)
    line-height : 줄 간격
    font shorthand : font 관련 속성ㅇ르 한 줄로 작성
  -->
  <div>
    <p id="font1">가나다라마바사 ABCDEFGHIJKLMN opqrstuvwxyz 123467890</p>
    <p id="font2">가나다라마바사 ABCDEFGHIJKLMN opqrstuvwxyz 123467890</p>
    <p id="font3">가나다라마바사 ABCDEFGHIJKLMN opqrstuvwxyz 123467890</p>
  </div>
  
  <!-- 글자 크기 단위
    px -> 픽셀 절대 크기
    % -> 부모 요소 기준 상대 크기
    em -> 부모 폰트 크기 기준 상대 크기
    rem -> 루트(html) 기준 상대 크기
  -->
  <div id="parent">
    <p>Helloworld px</p>
    <p>Helloworld %</p>
    <p>Helloworld em</p>
    <p>Helloworld rem</p>
  </div>
</body>
</html>
